<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #playButton {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 8px 18px;
      background: transparent;
      color: white;
      border: 1px solid white;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #playButton:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <button id="playButton">play</button>

  <script type="text/javascript">

    // -------------------------------------------------------------------------
    // Three.js scene
    // -------------------------------------------------------------------------
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.z = 500;

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -------------------------------------------------------------------------
    // FFT data texture — updated every frame from the AnalyserNode.
    // Single-channel Float32; shader reads the R channel as linear amplitude.
    // -------------------------------------------------------------------------
    var FFT_BINS    = 256;
    var fftArray    = new Float32Array(FFT_BINS);
    var fftTexture  = new THREE.DataTexture(fftArray, FFT_BINS, 1, THREE.RedFormat, THREE.FloatType);
    fftTexture.magFilter = THREE.NearestFilter;
    fftTexture.needsUpdate = true;

    // -------------------------------------------------------------------------
    // Shaders
    // -------------------------------------------------------------------------
    var vertexShader = /* glsl */`
      uniform sampler2D uFFT;     // frequency-magnitude texture (linear amplitude per bin)
      uniform float     uDeform;  // maximum radial displacement in world units
      uniform float     uTime;    // elapsed seconds (available for future use)

      void main() {
        // uv.x goes 0→1 around the sphere's longitude, but 0 and 1 are the same
        // seam point — so the sphere has one half at u=0..0.5 and the mirror
        // half at u=0.5..1.  Cycling twice with fract(uv.x * 2.0) maps both
        // halves to the full FFT range, so the whole sphere deforms uniformly.
        float mag      = texture2D(uFFT, vec2(fract(uv.x * 2.0), 0.5)).r;
        vec3  displaced = position + normal * mag * uDeform;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
      }
    `;

    var fragmentShader = /* glsl */`
      void main() {
        gl_FragColor = vec4(1.0, 1.0, 1.0, 1.0);
      }
    `;

    // -------------------------------------------------------------------------
    // Sphere mesh — geometry matches original dim=22 segment count
    // -------------------------------------------------------------------------
    var geometry = new THREE.SphereGeometry(200, 22, 22);
    var material = new THREE.ShaderMaterial({
      uniforms: {
        uFFT:    { value: fftTexture },
        uDeform: { value: 1000.0 },  // deform scale; linear amplitude vals can exceed 1
        uTime:   { value: 0.0 }
      },
      vertexShader:   vertexShader,
      fragmentShader: fragmentShader,
      wireframe:      true
    });

    var sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // -------------------------------------------------------------------------
    // Audio analysis state
    // -------------------------------------------------------------------------
    var analyser      = null;
    var floatFreqData = null;
    var timeData      = null;
    var smoothedA    = 0;   // proxy for _a envelope — drives X rotation rate
    var smoothedB    = 0;   // proxy for _b envelope — drives Y rotation rate

    // -------------------------------------------------------------------------
    // Event generator parameters
    // Real-time params are pushed to the audio thread via maxi.send/Input.
    // Init-only params are baked into the DSP code once at startup.
    // -------------------------------------------------------------------------
    var audioParams = {
      // init-only: synthesis envelope starting state
      initialA:                  0.5,
      initialB:                  0.5,
      initialFeedback:           0.9999,
      initialBFeedback:          0.9999,
      initialFreq:               350,
      initialFreq2:              50,
      initialModI:               650,
      // init-only: clock
      tempo:                     90,
      ticksPerBeat:              4,
      // real-time: event generator control
      sparsity_1:                0.4,
      sparsity_2:                0.5,
      maxTicksPerBeat:           8,
      slowFreq2:                 100,
      slowModI:                  1,
      positiveFeedbackThreshold: 0.75,
      positiveFeedbackValue:     1.00001,
      decayFeedbackValue:        0.999,
      fastFreqBase:              250,
      fastFreqRange:             350,
      fastFeedbackBase:          0.999,
      fastFeedbackRange:         0.001,
      fastFreq2Range:            300,
      fastModIRange:             10000
    };

    // Index order must exactly match the reads inside play() in buildDSPCode
    var REALTIME_PARAM_KEYS = [
      'sparsity_1',                 // p[0]
      'sparsity_2',                 // p[1]
      'maxTicksPerBeat',            // p[2]
      'slowFreq2',                  // p[3]
      'slowModI',                   // p[4]
      'positiveFeedbackThreshold',  // p[5]
      'positiveFeedbackValue',      // p[6]
      'decayFeedbackValue',         // p[7]
      'fastFreqBase',               // p[8]
      'fastFreqRange',              // p[9]
      'fastFeedbackBase',           // p[10]
      'fastFeedbackRange',          // p[11]
      'fastFreq2Range',             // p[12]
      'fastModIRange'               // p[13]
    ];

    function sendRealtimeParams() {
      if (!maxi) return;
      maxi.send('params', REALTIME_PARAM_KEYS.map(function(k) { return audioParams[k]; }));
    }

    // Update any subset of audioParams without restarting synthesis.
    // Real-time params take effect within the next audio block (~3 ms).
    function updateParams(changes) {
      Object.assign(audioParams, changes);
      sendRealtimeParams();
    }

    // -------------------------------------------------------------------------
    // DSP code — built once at startup; real-time params arrive via Input
    // -------------------------------------------------------------------------
    function buildDSPCode(p) {
      return [
        'var myOsc  = new Maximilian.maxiOsc();',
        'var myOsc2 = new Maximilian.maxiOsc();',
        'var myOsc3 = new Maximilian.maxiOsc();',
        '',
        'var paramsIn = new Input("params");',
        '',
        'var c = new Maximilian.maxiClock();',
        'var d = new Maximilian.maxiClock();',
        'c.setTempo('        + p.tempo        + ');',
        'c.setTicksPerBeat(' + p.ticksPerBeat + ');',
        'd.setTempo('        + p.tempo        + ');',
        '',
        'var _a        = ' + p.initialA        + ';',
        'var _b        = ' + p.initialB        + ';',
        'var _feedback  = ' + p.initialFeedback  + ';',
        'var _bFeedback = ' + p.initialBFeedback + ';',
        'var _freq      = ' + p.initialFreq      + ';',
        'var _freq2     = ' + p.initialFreq2     + ';',
        'var _modI      = ' + p.initialModI      + ';',
        '',
        'var sparsity_1                = ' + p.sparsity_1                + ';',
        'var sparsity_2                = ' + p.sparsity_2                + ';',
        'var maxTicksPerBeat           = ' + p.maxTicksPerBeat           + ';',
        'var slowFreq2                 = ' + p.slowFreq2                 + ';',
        'var slowModI                  = ' + p.slowModI                  + ';',
        'var positiveFeedbackThreshold = ' + p.positiveFeedbackThreshold + ';',
        'var positiveFeedbackValue     = ' + p.positiveFeedbackValue     + ';',
        'var decayFeedbackValue        = ' + p.decayFeedbackValue        + ';',
        'var fastFreqBase              = ' + p.fastFreqBase              + ';',
        'var fastFreqRange             = ' + p.fastFreqRange             + ';',
        'var fastFeedbackBase          = ' + p.fastFeedbackBase          + ';',
        'var fastFeedbackRange         = ' + p.fastFeedbackRange         + ';',
        'var fastFreq2Range            = ' + p.fastFreq2Range            + ';',
        'var fastModIRange             = ' + p.fastModIRange             + ';',
        '',
        'function play() {',
        '  var p = paramsIn.getValue();',
        '  if (p) {',
        '    sparsity_1                = p[0];',
        '    sparsity_2                = p[1];',
        '    maxTicksPerBeat           = p[2];',
        '    slowFreq2                 = p[3];',
        '    slowModI                  = p[4];',
        '    positiveFeedbackThreshold = p[5];',
        '    positiveFeedbackValue     = p[6];',
        '    decayFeedbackValue        = p[7];',
        '    fastFreqBase              = p[8];',
        '    fastFreqRange             = p[9];',
        '    fastFeedbackBase          = p[10];',
        '    fastFeedbackRange         = p[11];',
        '    fastFreq2Range            = p[12];',
        '    fastModIRange             = p[13];',
        '  }',
        '',
        '  c.ticker();',
        '  d.ticker();',
        '',
        '  if (d.tick && Math.random() > sparsity_1) {',
        '    c.setTicksPerBeat(Math.floor(1 + Math.random() * maxTicksPerBeat));',
        '    _a = 1.0;',
        '    _b = 1.0;',
        '    _bFeedback = Math.random() > positiveFeedbackThreshold',
        '      ? positiveFeedbackValue',
        '      : decayFeedbackValue;',
        '    _freq2 = slowFreq2;',
        '    _modI  = slowModI;',
        '  }',
        '  if (c.tick && Math.random() > sparsity_2 && !d.tick) {',
        '    _freq      = fastFreqBase + (Math.random() * fastFreqRange);',
        '    _a         = 1.0;',
        '    _b         = 1.0;',
        '    _feedback  = fastFeedbackBase + (Math.random() * fastFeedbackRange);',
        '    _bFeedback = fastFeedbackBase + (Math.random() * fastFeedbackRange);',
        '    _freq2     = Math.random() * fastFreq2Range;',
        '    _modI      = Math.random() * fastModIRange;',
        '  }',
        '',
        '  _a *= _feedback;',
        '  _b *= _bFeedback;',
        '',
        '  return myOsc.sinewave((_freq * _b) + (myOsc2.sinewave(_freq2) * _modI)) * _a;',
        '}'
      ].join('\n');
    }

    // -------------------------------------------------------------------------
    // Audio engine
    // -------------------------------------------------------------------------
    var maxi;
    initAudioEngine('https://louismac.github.io/maximilian-js-local').then(function(dspEngine) {
      maxi = dspEngine;
      sendRealtimeParams();                         // seed buffer before DSP init
      maxi.setAudioCode(buildDSPCode(audioParams)); // called once — never again
    });

    var playing    = false;
    var playButton = document.getElementById('playButton');
    playButton.addEventListener('click', function() {
      if (!maxi) return;
      if (!playing) {
        maxi.play();
        playing = true;
        playButton.textContent = 'stop';
        if (!analyser && maxi.audioWorkletNode) {
          var audioCtx  = maxi.audioWorkletNode.context;
          analyser      = audioCtx.createAnalyser();
          analyser.fftSize = FFT_BINS * 2; // frequencyBinCount = FFT_BINS
          floatFreqData = new Float32Array(analyser.frequencyBinCount);
          timeData      = new Float32Array(analyser.fftSize);
          maxi.audioWorkletNode.connect(analyser);
        }
      } else {
        maxi.audioWorkletNode.context.suspend();
        playing = false;
        playButton.textContent = 'play';
      }
    });

    // -------------------------------------------------------------------------
    // Render loop
    // -------------------------------------------------------------------------
    var clock = new THREE.Clock();

    function draw() {
      var elapsed = clock.getElapsedTime();
      material.uniforms.uTime.value = elapsed;

      if (analyser) {
        // Update FFT texture — convert dB → linear amplitude so large FM
        // magnitudes produce the same explosive deformation as the original.
        analyser.getFloatFrequencyData(floatFreqData);
        for (var i = 0; i < FFT_BINS; i++) {
          var db = floatFreqData[i];
          fftArray[i] = isFinite(db) ? Math.pow(10, db / 20) : 0;
        }
        fftTexture.needsUpdate = true;

        // RMS amplitude for rotation proxy
        analyser.getFloatTimeDomainData(timeData);
        var rms = 0;
        for (var k = 0; k < timeData.length; k++) rms += timeData[k] * timeData[k];
        rms = Math.sqrt(rms / timeData.length);

        smoothedA = smoothedA * 0.90 + rms * 0.10;
        smoothedB = smoothedB * 0.95 + rms * 0.05;
      }

      // Accumulate rotation — same a/10, b/15 scaling as the original
      sphere.rotation.x += smoothedA / 10;
      sphere.rotation.y += smoothedB / 15;

      renderer.render(scene, camera);
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    // -------------------------------------------------------------------------
    // GUI — lil-gui (Three.js's built-in parameter controls)
    // Each audio control mutates audioParams directly; onChange fires
    // sendRealtimeParams() to push all current values to the ring buffer.
    // Visual controls update Three.js uniforms directly.
    // -------------------------------------------------------------------------
    var visualParams = { uDeform: material.uniforms.uDeform.value };

    var gui = new lil.GUI({ title: 'Jazz' });

    var timingFolder = gui.addFolder('Timing');
    timingFolder.add(audioParams, 'sparsity_1',       0,   1,   0.01).name('Slow event threshold').onChange(sendRealtimeParams);
    timingFolder.add(audioParams, 'sparsity_2',       0,   1,   0.01).name('Fast event threshold').onChange(sendRealtimeParams);
    timingFolder.add(audioParams, 'maxTicksPerBeat',  1,  16,   1   ).name('Max subdivisions')    .onChange(sendRealtimeParams);

    var slowFolder = gui.addFolder('Slow Events');
    slowFolder.add(audioParams, 'slowFreq2',                 1, 2000, 1      ).name('Modulator freq (Hz)')  .onChange(sendRealtimeParams);
    slowFolder.add(audioParams, 'slowModI',                  0,  100, 0.1    ).name('Mod index')             .onChange(sendRealtimeParams);
    slowFolder.add(audioParams, 'positiveFeedbackThreshold', 0,    1, 0.01   ).name('Growth probability')   .onChange(sendRealtimeParams);
    slowFolder.add(audioParams, 'positiveFeedbackValue',     1, 1.001, 0.00001).name('Growth rate')          .onChange(sendRealtimeParams);
    slowFolder.add(audioParams, 'decayFeedbackValue',      0.9,    1, 0.0001 ).name('Decay rate')            .onChange(sendRealtimeParams);

    var fastFolder = gui.addFolder('Fast Events');
    fastFolder.add(audioParams, 'fastFreqBase',     0, 2000,    1).name('Carrier freq base (Hz)') .onChange(sendRealtimeParams);
    fastFolder.add(audioParams, 'fastFreqRange',    0, 2000,    1).name('Carrier freq range (Hz)').onChange(sendRealtimeParams);
    fastFolder.add(audioParams, 'fastFeedbackBase', 0.99, 1, 0.0001).name('Feedback base')        .onChange(sendRealtimeParams);
    fastFolder.add(audioParams, 'fastFeedbackRange', 0, 0.01, 0.00001).name('Feedback range')     .onChange(sendRealtimeParams);
    fastFolder.add(audioParams, 'fastFreq2Range',   0, 1000,    1).name('Modulator freq range (Hz)').onChange(sendRealtimeParams);
    fastFolder.add(audioParams, 'fastModIRange',    0, 20000,   1).name('Mod index range')         .onChange(sendRealtimeParams);

    var visualFolder = gui.addFolder('Visuals');
    visualFolder.add(visualParams, 'uDeform', 0, 3000, 1).name('Deform depth').onChange(function() {
      material.uniforms.uDeform.value = visualParams.uDeform;
    });

  </script>
</body>
</html>
