<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz</title>
  <style>
    canvas { position: absolute; top: 0; left: 0; }
    #playButton {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 8px 18px;
      background: transparent;
      color: white;
      border: 1px solid white;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #playButton:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body style="margin:0;background:#000;">

  <canvas id="myCanvas"></canvas>
  <button id="playButton">play</button>

  <!--
    DSP code — runs inside an AudioWorklet on the audio thread.
    "Maximilian.xxx" is replaced with "Module.xxx" at runtime by the engine.
    All event-generator control parameters are exposed as variables
    at the top of this block with their original default values.
  -->
  <script id="myAudioScript">
    var myOsc  = new Maximilian.maxiOsc();
    var myOsc2 = new Maximilian.maxiOsc();
    var myOsc3 = new Maximilian.maxiOsc();

    var c = new Maximilian.maxiClock();
    var d = new Maximilian.maxiClock();
    c.setTempo(90);
    c.setTicksPerBeat(4);
    d.setTempo(90);

    // --- event generator control parameters (edit these to change behaviour) ---
    var _a                        = 0.5;      // initial amplitude envelope
    var _b                        = 0.5;      // initial modulation envelope
    var _feedback                 = 0.9999;   // primary amplitude decay per sample
    var _bFeedback                = 0.9999;   // modulation amplitude decay per sample
    var _freq                     = 350;      // primary oscillator frequency (Hz)
    var _freq2                    = 50;       // modulation oscillator frequency (Hz)
    var _modI                     = 650;      // FM modulation index
    var sparsity_1                = 0.4;      // probability threshold for slow events
    var sparsity_2                = 0.5;      // probability threshold for fast events
    var maxTicksPerBeat           = 8;        // max subdivision randomised on slow events
    var slowFreq2                 = 100;      // modulator freq set on slow events (Hz)
    var slowModI                  = 1;        // modulation index set on slow events
    var positiveFeedbackThreshold = 0.75;     // P(growth) vs P(decay) on slow events
    var positiveFeedbackValue     = 1.00001;  // bFeedback when growing
    var decayFeedbackValue        = 0.999;    // bFeedback when decaying
    var fastFreqBase              = 250;      // fast event: minimum carrier freq (Hz)
    var fastFreqRange             = 350;      // fast event: carrier freq random range (Hz)
    var fastFeedbackBase          = 0.999;    // fast event: feedback base value
    var fastFeedbackRange         = 0.001;    // fast event: feedback random range
    var fastFreq2Range            = 300;      // fast event: modulator freq range (Hz)
    var fastModIRange             = 10000;    // fast event: modulation index range
    // -------------------------------------------------------------------------

    function play() {
      c.ticker();
      d.ticker();

      if (d.tick && Math.random() > sparsity_1) {
        c.setTicksPerBeat(Math.floor(1 + Math.random() * maxTicksPerBeat));
        _a = 1.0;
        _b = 1.0;
        _bFeedback = Math.random() > positiveFeedbackThreshold
          ? positiveFeedbackValue
          : decayFeedbackValue;
        _freq2 = slowFreq2;
        _modI  = slowModI;
      }
      if (c.tick && Math.random() > sparsity_2 && !d.tick) {
        _freq      = fastFreqBase + (Math.random() * fastFreqRange);
        _a         = 1.0;
        _b         = 1.0;
        _feedback  = fastFeedbackBase + (Math.random() * fastFeedbackRange);
        _bFeedback = fastFeedbackBase + (Math.random() * fastFeedbackRange);
        _freq2     = Math.random() * fastFreq2Range;
        _modI      = Math.random() * fastModIRange;
      }

      _a *= _feedback;
      _b *= _bFeedback;

      return myOsc.sinewave((_freq * _b) + (myOsc2.sinewave(_freq2) * _modI)) * _a;
    }
  </script>

  <script type="text/javascript">
    // --- canvas setup ---
    var fov     = 500;
    var canvas  = document.querySelector("canvas");
    var width   = window.innerWidth;
    var height  = window.innerHeight;
    var ctx     = canvas.getContext("2d");
    canvas.setAttribute("width",  width);
    canvas.setAttribute("height", height);

    var HALF_WIDTH  = width  / 2;
    var HALF_HEIGHT = height / 2;
    var x3d = 0, y3d = 0, z3d = 0;
    var lastX = 0, lastY = 0;

    // --- sphere geometry — initialised once, mutated in place by rotation each frame ---
    var dim       = 22;
    var spacing   = (Math.PI * 2) / dim;
    var numPoints = dim * dim;
    var size      = 200;

    var points = [];
    for (var i = 0; i < dim; i++) {
      var pz = size * Math.cos(spacing / 2 * i);
      var ps = size * Math.sin(spacing / 2 * i);
      for (var j = 0; j < dim; j++) {
        points.push([Math.cos(spacing * j) * ps, Math.sin(spacing * j) * ps, pz]);
      }
    }

    // --- audio analysis state ---
    // Since the play function runs on the audio thread we can't read its internal
    // state directly. Instead we tap the output via a Web Audio AnalyserNode and
    // derive proxies for the original a/b envelopes from the RMS amplitude.
    var analyser  = null;
    var freqData  = null;
    var timeData  = null;
    var smoothedA = 0.5;   // proxy for _a — slower decay
    var smoothedB = 0.33;  // proxy for _b — faster decay (different time constant)

    // --- audio engine ---
    var maxi;
    initAudioEngine("https://louismac.github.io/maximilian-js-local").then(function(dspEngine) {
      maxi = dspEngine;
      maxi.setAudioCode("myAudioScript");
    });

    // Play button is required: Web Audio needs a user gesture to start
    var playing    = false;
    var playButton = document.getElementById("playButton");
    playButton.addEventListener("click", function() {
      if (!maxi) return;
      if (!playing) {
        maxi.play();
        playing = true;
        playButton.textContent = "stop";

        // Wire up AnalyserNode after audio context is live
        if (!analyser && maxi.audioWorkletNode) {
          var audioCtx = maxi.audioWorkletNode.context;
          analyser  = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          freqData  = new Float32Array(analyser.frequencyBinCount);
          timeData  = new Float32Array(analyser.fftSize);
          maxi.audioWorkletNode.connect(analyser);
        }
      } else {
        maxi.audioWorkletNode.context.suspend();
        playing = false;
        playButton.textContent = "play";
      }
    });

    // --- draw loop ---
    function draw() {
      if (analyser) {
        analyser.getFloatFrequencyData(freqData);
        analyser.getFloatTimeDomainData(timeData);

        // RMS amplitude from time-domain signal
        var rms = 0;
        for (var k = 0; k < timeData.length; k++) rms += timeData[k] * timeData[k];
        rms = Math.sqrt(rms / timeData.length);

        // Two smoothed envelopes with different time constants — proxy for _a and _b
        smoothedA = smoothedA * 0.90 + rms * 0.10;
        smoothedB = smoothedB * 0.95 + rms * 0.05;
      }

      ctx.fillStyle = "rgb(0,0,0)";
      ctx.fillRect(0, 0, width, height);

      var angleX = smoothedA / 10;
      var angleY = smoothedB / 15;

      ctx.beginPath();
      for (var i = 0; i < numPoints; i++) {
        var point3d = points[i];
        z3d = point3d[2];
        if (z3d < -fov) z3d += 0;
        point3d[2] = z3d;

        rotateX(point3d, angleX);
        rotateY(point3d, angleY);

        // Spectral distortion: normalise AnalyserNode dB values to [0, 1]
        var mag = 0;
        if (freqData) {
          var dBVal = freqData[i % 20];
          mag = Math.max(0, (dBVal - analyser.minDecibels) / (analyser.maxDecibels - analyser.minDecibels));
        }

        x3d = point3d[0] * mag * (smoothedA / 50);
        y3d = point3d[1] * mag * (smoothedA / 50);
        z3d = point3d[2] * mag * (smoothedA / 50);

        var scale = fov / (fov + z3d);
        var x2d = (x3d * scale) + HALF_WIDTH / 2;
        var y2d = (y3d * scale) + height / 2;

        ctx.strokeStyle = "rgb(255,255,255)";
        ctx.moveTo(x2d, y2d);
        ctx.lineTo(lastX + scale, lastY);
        ctx.stroke();
        lastX = x2d;
        lastY = y2d;
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    function rotateX(point3d, angleX) {
      var x    = point3d[0];
      var z    = point3d[2];
      var cosA = Math.cos(angleX);
      var sinA = Math.sin(angleX);
      point3d[0] = (x * cosA) + (z * sinA);
      point3d[2] = (x * -sinA) + (z * cosA);
    }

    function rotateY(point3d, angleY) {
      var y    = point3d[1];
      var z    = point3d[2];
      var cosA = Math.cos(angleY);
      var sinA = Math.sin(angleY);
      point3d[1] = (y * cosA) + (z * sinA);
      point3d[2] = (y * -sinA) + (z * cosA);
    }
  </script>
</body>
</html>
