<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz</title>
  <style>
    canvas { position: absolute; top: 0; left: 0; }
    #playButton {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 8px 18px;
      background: transparent;
      color: white;
      border: 1px solid white;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #playButton:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body style="margin:0;background:#000;">

  <canvas id="myCanvas"></canvas>
  <button id="playButton">play</button>

  <script type="text/javascript">

    // ---------------------------------------------------------------------------
    // All event-generator parameters live here on the main thread.
    //
    // REAL-TIME params (listed in REALTIME_PARAM_KEYS below) are pushed to the
    // audio thread via maxi.send() / Input — call updateParams() at any time
    // without interrupting synthesis.
    //
    // INIT-ONLY params (initial envelope state, tempo, clock subdivision) are
    // baked into the DSP code once at startup via buildDSPCode().
    // ---------------------------------------------------------------------------
    var audioParams = {
      // -- init-only: synthesis envelope starting state --
      initialA:                  0.5,
      initialB:                  0.5,
      initialFeedback:           0.9999,
      initialBFeedback:          0.9999,
      initialFreq:               350,
      initialFreq2:              50,
      initialModI:               650,
      // -- init-only: clock --
      tempo:                     90,
      ticksPerBeat:              4,
      // -- real-time: event generator control --
      sparsity_1:                0.4,
      sparsity_2:                0.5,
      maxTicksPerBeat:           8,
      slowFreq2:                 100,
      slowModI:                  1,
      positiveFeedbackThreshold: 0.75,
      positiveFeedbackValue:     1.00001,
      decayFeedbackValue:        0.999,
      fastFreqBase:              250,
      fastFreqRange:             350,
      fastFeedbackBase:          0.999,
      fastFeedbackRange:         0.001,
      fastFreq2Range:            300,
      fastModIRange:             10000
    };

    // Ordered list of real-time params — index here MUST match index in play()
    var REALTIME_PARAM_KEYS = [
      'sparsity_1',                 // p[0]
      'sparsity_2',                 // p[1]
      'maxTicksPerBeat',            // p[2]
      'slowFreq2',                  // p[3]
      'slowModI',                   // p[4]
      'positiveFeedbackThreshold',  // p[5]
      'positiveFeedbackValue',      // p[6]
      'decayFeedbackValue',         // p[7]
      'fastFreqBase',               // p[8]
      'fastFreqRange',              // p[9]
      'fastFeedbackBase',           // p[10]
      'fastFeedbackRange',          // p[11]
      'fastFreq2Range',             // p[12]
      'fastModIRange'               // p[13]
    ];

    // Push all real-time params to the audio thread ring buffer.
    // Safe to call at any time — synthesis state is never interrupted.
    function sendRealtimeParams() {
      if (!maxi) return;
      maxi.send('params', REALTIME_PARAM_KEYS.map(function(k) { return audioParams[k]; }));
    }

    // Update any subset of audioParams and send the change to the audio thread.
    // For real-time params this takes effect within the next audio block (~3ms).
    // For init-only params the new value is stored but won't affect the running
    // synthesis (those require a page reload to take effect).
    function updateParams(changes) {
      Object.assign(audioParams, changes);
      sendRealtimeParams();
    }

    // ---------------------------------------------------------------------------
    // DSP code generator — called ONCE on startup.
    // Only init-only params are baked in here. Real-time params are received
    // each audio block via new Input("params") / paramsIn.getValue().
    // ---------------------------------------------------------------------------
    function buildDSPCode(p) {
      return [
        'var myOsc  = new Maximilian.maxiOsc();',
        'var myOsc2 = new Maximilian.maxiOsc();',
        'var myOsc3 = new Maximilian.maxiOsc();',
        '',
        '// Ring-buffer input for real-time param updates from the main thread',
        'var paramsIn = new Input("params");',
        '',
        'var c = new Maximilian.maxiClock();',
        'var d = new Maximilian.maxiClock();',
        'c.setTempo('        + p.tempo        + ');',
        'c.setTicksPerBeat(' + p.ticksPerBeat + ');',
        'd.setTempo('        + p.tempo        + ');',
        '',
        '// Synthesis state — initial values baked in, evolved by the play loop',
        'var _a        = ' + p.initialA        + ';',
        'var _b        = ' + p.initialB        + ';',
        'var _feedback  = ' + p.initialFeedback  + ';',
        'var _bFeedback = ' + p.initialBFeedback + ';',
        'var _freq      = ' + p.initialFreq      + ';',
        'var _freq2     = ' + p.initialFreq2     + ';',
        'var _modI      = ' + p.initialModI      + ';',
        '',
        '// Real-time control params — defaults below are overridden by paramsIn each block',
        'var sparsity_1                = ' + p.sparsity_1                + ';',
        'var sparsity_2                = ' + p.sparsity_2                + ';',
        'var maxTicksPerBeat           = ' + p.maxTicksPerBeat           + ';',
        'var slowFreq2                 = ' + p.slowFreq2                 + ';',
        'var slowModI                  = ' + p.slowModI                  + ';',
        'var positiveFeedbackThreshold = ' + p.positiveFeedbackThreshold + ';',
        'var positiveFeedbackValue     = ' + p.positiveFeedbackValue     + ';',
        'var decayFeedbackValue        = ' + p.decayFeedbackValue        + ';',
        'var fastFreqBase              = ' + p.fastFreqBase              + ';',
        'var fastFreqRange             = ' + p.fastFreqRange             + ';',
        'var fastFeedbackBase          = ' + p.fastFeedbackBase          + ';',
        'var fastFeedbackRange         = ' + p.fastFeedbackRange         + ';',
        'var fastFreq2Range            = ' + p.fastFreq2Range            + ';',
        'var fastModIRange             = ' + p.fastModIRange             + ';',
        '',
        'function play() {',
        '  // Pull latest params from main thread (returns null when no new message)',
        '  var p = paramsIn.getValue();',
        '  if (p) {',
        '    sparsity_1                = p[0];',
        '    sparsity_2                = p[1];',
        '    maxTicksPerBeat           = p[2];',
        '    slowFreq2                 = p[3];',
        '    slowModI                  = p[4];',
        '    positiveFeedbackThreshold = p[5];',
        '    positiveFeedbackValue     = p[6];',
        '    decayFeedbackValue        = p[7];',
        '    fastFreqBase              = p[8];',
        '    fastFreqRange             = p[9];',
        '    fastFeedbackBase          = p[10];',
        '    fastFeedbackRange         = p[11];',
        '    fastFreq2Range            = p[12];',
        '    fastModIRange             = p[13];',
        '  }',
        '',
        '  c.ticker();',
        '  d.ticker();',
        '',
        '  if (d.tick && Math.random() > sparsity_1) {',
        '    c.setTicksPerBeat(Math.floor(1 + Math.random() * maxTicksPerBeat));',
        '    _a = 1.0;',
        '    _b = 1.0;',
        '    _bFeedback = Math.random() > positiveFeedbackThreshold',
        '      ? positiveFeedbackValue',
        '      : decayFeedbackValue;',
        '    _freq2 = slowFreq2;',
        '    _modI  = slowModI;',
        '  }',
        '  if (c.tick && Math.random() > sparsity_2 && !d.tick) {',
        '    _freq      = fastFreqBase + (Math.random() * fastFreqRange);',
        '    _a         = 1.0;',
        '    _b         = 1.0;',
        '    _feedback  = fastFeedbackBase + (Math.random() * fastFeedbackRange);',
        '    _bFeedback = fastFeedbackBase + (Math.random() * fastFeedbackRange);',
        '    _freq2     = Math.random() * fastFreq2Range;',
        '    _modI      = Math.random() * fastModIRange;',
        '  }',
        '',
        '  _a *= _feedback;',
        '  _b *= _bFeedback;',
        '',
        '  return myOsc.sinewave((_freq * _b) + (myOsc2.sinewave(_freq2) * _modI)) * _a;',
        '}'
      ].join('\n');
    }

    // ---------------------------------------------------------------------------
    // Canvas / visualisation
    // ---------------------------------------------------------------------------
    var fov    = 500;
    var canvas = document.querySelector('canvas');
    var width  = window.innerWidth;
    var height = window.innerHeight;
    var ctx    = canvas.getContext('2d');
    canvas.setAttribute('width',  width);
    canvas.setAttribute('height', height);

    var HALF_WIDTH = width / 2;
    var x3d = 0, y3d = 0, z3d = 0;
    var lastX = 0, lastY = 0;

    // Sphere points initialised once; rotateX/Y mutate them in place each frame
    var dim       = 22;
    var spacing   = (Math.PI * 2) / dim;
    var numPoints = dim * dim;
    var size      = 200;

    var points = [];
    for (var i = 0; i < dim; i++) {
      var pz = size * Math.cos(spacing / 2 * i);
      var ps = size * Math.sin(spacing / 2 * i);
      for (var j = 0; j < dim; j++) {
        points.push([Math.cos(spacing * j) * ps, Math.sin(spacing * j) * ps, pz]);
      }
    }

    var analyser  = null;
    var freqData  = null;
    var timeData  = null;
    var smoothedA = 0;
    var smoothedB = 0;

    // ---------------------------------------------------------------------------
    // Audio engine
    // ---------------------------------------------------------------------------
    var maxi;
    initAudioEngine('https://louismac.github.io/maximilian-js-local').then(function(dspEngine) {
      maxi = dspEngine;
      // Seed the ring buffer BEFORE setAudioCode so new Input("params") in the
      // DSP code finds the buffer already live when the worklet initialises it.
      sendRealtimeParams();
      maxi.setAudioCode(buildDSPCode(audioParams));
    });

    var playing    = false;
    var playButton = document.getElementById('playButton');
    playButton.addEventListener('click', function() {
      if (!maxi) return;
      if (!playing) {
        maxi.play();
        playing = true;
        playButton.textContent = 'stop';
        if (!analyser && maxi.audioWorkletNode) {
          var audioCtx = maxi.audioWorkletNode.context;
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          freqData = new Float32Array(analyser.frequencyBinCount);
          timeData = new Float32Array(analyser.fftSize);
          maxi.audioWorkletNode.connect(analyser);
        }
      } else {
        maxi.audioWorkletNode.context.suspend();
        playing = false;
        playButton.textContent = 'play';
      }
    });

    // ---------------------------------------------------------------------------
    // Draw loop
    // ---------------------------------------------------------------------------
    function draw() {
      if (analyser) {
        analyser.getFloatFrequencyData(freqData);
        analyser.getFloatTimeDomainData(timeData);

        var rms = 0;
        for (var k = 0; k < timeData.length; k++) rms += timeData[k] * timeData[k];
        rms = Math.sqrt(rms / timeData.length);

        smoothedA = smoothedA * 0.90 + rms * 0.10;
        smoothedB = smoothedB * 0.95 + rms * 0.05;
      }

      ctx.fillStyle = 'rgb(0,0,0)';
      ctx.fillRect(0, 0, width, height);

      var angleX = smoothedA / 10;
      var angleY = smoothedB / 15;

      ctx.beginPath();
      for (var i = 0; i < numPoints; i++) {
        var point3d = points[i];

        rotateX(point3d, angleX);
        rotateY(point3d, angleY);

        // Normalise AnalyserNode dB value → [0, 1]; use as radial distortion.
        // radialScale=1 renders the sphere at full size even with no audio.
        var mag = 0;
        if (freqData) {
          var dBVal = freqData[i % 20];
          mag = Math.max(0, (dBVal - analyser.minDecibels) / (analyser.maxDecibels - analyser.minDecibels));
        }

        var radialScale = 1 + mag * 2;
        x3d = point3d[0] * radialScale;
        y3d = point3d[1] * radialScale;
        z3d = point3d[2] * radialScale;

        var scale = fov / (fov + z3d);
        var x2d = (x3d * scale) + HALF_WIDTH / 2;
        var y2d = (y3d * scale) + height / 2;

        ctx.strokeStyle = 'rgb(255,255,255)';
        ctx.moveTo(x2d, y2d);
        ctx.lineTo(lastX + scale, lastY);
        ctx.stroke();
        lastX = x2d;
        lastY = y2d;
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    function rotateX(point3d, angle) {
      var x = point3d[0], z = point3d[2];
      var c = Math.cos(angle), s = Math.sin(angle);
      point3d[0] = x * c + z * s;
      point3d[2] = x * -s + z * c;
    }

    function rotateY(point3d, angle) {
      var y = point3d[1], z = point3d[2];
      var c = Math.cos(angle), s = Math.sin(angle);
      point3d[1] = y * c + z * s;
      point3d[2] = y * -s + z * c;
    }

  </script>
</body>
</html>
