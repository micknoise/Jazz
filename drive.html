<!DOCTYPE html>
<html>
<head>
  <script src="./enable-threads.js"></script>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jazz — Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    button:disabled { opacity: 0.35; cursor: default; }
    #hud { position: absolute; top: 16px; right: 16px; color: white; font-family: monospace; font-size: 13px; text-align: right; pointer-events: none; line-height: 2; }
    #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-family: monospace; text-align: center; pointer-events: none; }
    #overlay h1 { font-size: 36px; font-weight: normal; letter-spacing: 0.2em; margin-bottom: 12px; }
    #overlay p  { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; }
    #hint { position: absolute; bottom: 16px; left: 16px; color: rgba(255,255,255,0.25); font-size: 11px; font-family: monospace; pointer-events: none; }
    #touch-left, #touch-right {
      position: fixed; bottom: 0; width: 42%; height: 130px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 24px;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.1);
      user-select: none; -webkit-user-select: none; touch-action: none;
      transition: background 0.08s, color 0.08s;
    }
    #touch-left  { left: 0;  border-right: 1px solid rgba(255,255,255,0.06); }
    #touch-right { right: 0; }
    #touch-left.active, #touch-right.active {
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton" disabled>music</button>
  </div>
  <div id="hud">
    <div id="hud-score">score  0</div>
    <div id="hud-level">level  1</div>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">drive</h1>
    <p  id="overlay-msg">space / enter to start  ·  ← → to steer</p>
  </div>
  <div id="hint">← → or a d  ·  steer through the rings</div>
  <div id="touch-left">◀</div>
  <div id="touch-right">▶</div>

  <script>
  (function () {
    'use strict';

    // ── Constants ──────────────────────────────────────────────────────────────
    var NUM_RINGS     = 14;
    var RING_SPACING  = 190;
    var RING_RADIUS   = 112;   // centre of torus tube
    var RING_TUBE     = 7;     // torus tube thickness
    var HOLE_RADIUS   = RING_RADIUS - RING_TUBE; // inner edge of hole = 105
    var PLAYER_R      = 18;    // collision radius
    var SAFE_DIST     = HOLE_RADIUS - PLAYER_R;  // ~87: must stay within this of ring centre
    var STEER_SPEED   = 170;
    var STEER_BOUNDS  = 95;    // max x the player can reach
    var BASE_SPEED    = 290;
    var SPEED_INC     = 38;
    var LEVEL_TIME    = 15;    // seconds per level

    // ── State ──────────────────────────────────────────────────────────────────
    var state = 'idle';   // idle | playing | dead
    var score = 0, level = 1, levelTimer = 0;
    var playerX = 0;
    var keys = {};

    // ── Renderer ───────────────────────────────────────────────────────────────
    var renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.autoClear = false;
    document.body.appendChild(renderer.domElement);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(78, window.innerWidth / window.innerHeight, 1, 6000);
    camera.position.set(0, 0, 0);

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Trail fade quad ────────────────────────────────────────────────────────
    var fadeScene = new THREE.Scene();
    var fadeMat   = new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0.10,
      depthTest: false, depthWrite: false
    });
    fadeScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fadeMat));
    var fadeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    // ── Barycentric wireframe helper ───────────────────────────────────────────
    function addBary(geometry) {
      var g     = geometry.toNonIndexed();
      var count = g.attributes.position.count;
      var bary  = new Float32Array(count * 3);
      for (var i = 0; i < count; i += 3) {
        bary[i*3]=1;     bary[i*3+1]=0;   bary[i*3+2]=0;
        bary[(i+1)*3]=0; bary[(i+1)*3+1]=1; bary[(i+1)*3+2]=0;
        bary[(i+2)*3]=0; bary[(i+2)*3+1]=0; bary[(i+2)*3+2]=1;
      }
      g.setAttribute('barycentric', new THREE.BufferAttribute(bary, 3));
      return g;
    }

    // ── Shaders ────────────────────────────────────────────────────────────────
    var VERT = /* glsl */`
      attribute vec3 barycentric;
      varying vec3 vBary;
      uniform float uTime;
      uniform float uPulse;
      void main() {
        vBary = barycentric;
        float p = 1.0 + uPulse * sin(uTime * 3.0 + position.y * 0.03);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position * p, 1.0);
      }
    `;
    var FRAG = /* glsl */`
      varying vec3 vBary;
      uniform float uLineWidth;
      uniform vec3  uColor;
      void main() {
        vec3 d  = fwidth(vBary);
        vec3 a3 = smoothstep(vec3(0.0), d * uLineWidth, vBary);
        float edge  = min(min(a3.x, a3.y), a3.z);
        float alpha = 1.0 - edge;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(uColor, alpha);
      }
    `;

    function makeMat(col, lw) {
      return new THREE.ShaderMaterial({
        vertexShader: VERT, fragmentShader: FRAG,
        uniforms: {
          uLineWidth: { value: lw  || 2.0 },
          uColor:     { value: new THREE.Color(col || 0xffffff) },
          uTime:      { value: 0.0 },
          uPulse:     { value: 0.02 }
        },
        transparent: true, depthWrite: false
      });
    }

    // ── Rings ──────────────────────────────────────────────────────────────────
    var ringMat = makeMat(0xffffff, 2.0);
    var rings   = [];
    for (var i = 0; i < NUM_RINGS; i++) {
      var geo  = addBary(new THREE.TorusGeometry(RING_RADIUS, RING_TUBE, 8, 48));
      var mesh = new THREE.Mesh(geo, ringMat);
      mesh.position.z = -(i + 1) * RING_SPACING;
      scene.add(mesh);
      rings.push(mesh);
    }

    // ── Obstacles (audio-event driven) ────────────────────────────────────────
    var NUM_HAZARDS = 8;
    var HAZARD_R    = 20;
    var hazardMat   = makeMat(0xff7700, 2.5);
    hazardMat.uniforms.uPulse.value = 0.06;
    var hazards     = [];
    for (var h = 0; h < NUM_HAZARDS; h++) {
      var hm = new THREE.Mesh(addBary(new THREE.IcosahedronGeometry(18, 1)), hazardMat);
      hm.visible = false;
      scene.add(hm);
      hazards.push(hm);
    }

    function spawnHazard() {
      for (var h = 0; h < hazards.length; h++) {
        if (!hazards[h].visible) {
          hazards[h].position.set(
            (Math.random() * 2 - 1) * (STEER_BOUNDS * 0.85),
            (Math.random() - 0.5) * 50,
            -2200
          );
          hazards[h].rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
          hazards[h].visible = true;
          return;
        }
      }
    }

    function resetHazards() {
      for (var h = 0; h < hazards.length; h++) hazards[h].visible = false;
    }

    // ── HUD ────────────────────────────────────────────────────────────────────
    var hudScore     = document.getElementById('hud-score');
    var hudLevel     = document.getElementById('hud-level');
    var overlay      = document.getElementById('overlay');
    var overlayTitle = document.getElementById('overlay-title');
    var overlayMsg   = document.getElementById('overlay-msg');

    function speed()     { return BASE_SPEED + (level - 1) * SPEED_INC; }
    function maxOffset() { return Math.min((level - 1) * 13, 82); }

    function spawnRing(ring, zPos) {
      var mo = maxOffset();
      var ox = mo > 0 ? (Math.random() * 2 - 1) * mo : 0;
      ring.position.set(ox, 0, zPos);
      ring.rotation.z = Math.random() * Math.PI * 2;
      ring.rotation.x = (Math.random() - 0.5) * 0.12;
      ring.userData.ox = ox;
    }

    function resetRings() {
      for (var i = 0; i < rings.length; i++) {
        spawnRing(rings[i], -(i + 1) * RING_SPACING);
      }
    }

    function startGame() {
      score = 0; level = 1; levelTimer = 0; playerX = 0;
      camera.position.set(0, 0, 0);
      camera.rotation.set(0, 0, 0);
      ringMat.uniforms.uColor.value.setRGB(1, 1, 1);
      resetRings();
      resetHazards();
      state = 'playing';
      overlay.style.display = 'none';
      document.getElementById('hint').style.display = 'none';
    }

    function crash() {
      state = 'dead';
      ringMat.uniforms.uColor.value.setRGB(1, 0.12, 0.12);
      overlayTitle.textContent = 'crash';
      overlayMsg.textContent   = 'score  ' + Math.floor(score) + '   ·   space to retry';
      overlay.style.display    = '';
      setTimeout(function () { ringMat.uniforms.uColor.value.setRGB(1, 1, 1); }, 900);
    }

    // ── Input ──────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', function (e) {
      keys[e.code] = true;
      if ((e.code === 'Space' || e.code === 'Enter') && state !== 'playing') startGame();
    });
    document.addEventListener('keyup', function (e) { keys[e.code] = false; });

    // Touch controls
    var tl = document.getElementById('touch-left');
    var tr = document.getElementById('touch-right');

    function bindSteer(el, code) {
      el.addEventListener('touchstart',  function (e) { e.preventDefault(); keys[code] = true;  el.classList.add('active'); },    { passive: false });
      el.addEventListener('touchend',    function (e) { e.preventDefault(); keys[code] = false; el.classList.remove('active'); }, { passive: false });
      el.addEventListener('touchcancel', function (e) { e.preventDefault(); keys[code] = false; el.classList.remove('active'); }, { passive: false });
    }
    bindSteer(tl, 'ArrowLeft');
    bindSteer(tr, 'ArrowRight');

    // Tap anywhere to start (overlay has pointer-events:none so listen on document)
    document.addEventListener('touchstart', function (e) { if (state !== 'playing') startGame(); }, { passive: true });
    renderer.domElement.addEventListener('touchstart', function (e) { e.preventDefault(); }, { passive: false });

    // ── Audio (FM synth — same engine as Jazz variations) ─────────────────────
    var maxi, audioReady = false, audioPlaying = false;

    // c.tick (fast clock) fires the beat event → push to Output("beat") → maxi.onInput
    var DSP_CODE = [
      'var o1=new Maximilian.maxiOsc(), o2=new Maximilian.maxiOsc();',
      'var c=new Maximilian.maxiClock(), d=new Maximilian.maxiClock();',
      'var beatOut=new Output("beat");',
      'c.setTempo(128); c.setTicksPerBeat(4);',
      'd.setTempo(128); d.setTicksPerBeat(1);',
      'var _a=0.5,_b=0.5,_fb=0.9999,_bfb=0.9999,_f=400,_f2=50,_mi=650;',
      'function play(){',
      '  c.ticker(); d.ticker();',
      '  if(d.tick&&Math.random()>0.2){',
      '    c.setTicksPerBeat(Math.floor(1+Math.random()*14));',
      '    _a=1;_b=1;_bfb=Math.random()>0.75?1.00001:0.995;_f2=100;_mi=1;',
      '  }',
      '  if(c.tick&&Math.random()>0.25&&!d.tick){',
      '    _f=400+(Math.random()*800);_a=1;_b=1;',
      '    _fb=0.999+(Math.random()*0.001);_bfb=0.999+(Math.random()*0.001);',
      '    _f2=Math.random()*300;_mi=Math.random()*20000;',
      '    beatOut.push([1.0]);',
      '  }',
      '  _a*=_fb;_b*=_bfb;',
      '  return o1.sinewave((_f*_b)+(o2.sinewave(_f2)*_mi))*_a;',
      '}'
    ].join('\n');

    var playBtn = document.getElementById('playButton');

    initAudioEngine('https://louismac.github.io/maximilian-js-local')
      .then(function (engine) {
        maxi = engine;
        maxi.setAudioCode(DSP_CODE);
        // Receive beat events from DSP clock → spawn obstacle
        maxi.onInput = function (channel) {
          if (channel === 'beat' && state === 'playing') spawnHazard();
        };
        if (maxi.audioWorkletNode) {
          maxi.audioWorkletNode.context.suspend();
        }
        audioReady = true;
        playBtn.textContent = 'music';
        playBtn.disabled    = false;
      });

    playBtn.addEventListener('click', function () {
      if (!audioReady) return;
      if (!audioPlaying) {
        maxi.play();
        audioPlaying = true;
        playBtn.textContent = 'mute';
      } else {
        maxi.audioWorkletNode.context.suspend();
        audioPlaying = false;
        playBtn.textContent = 'music';
      }
    });

    // ── Loop ───────────────────────────────────────────────────────────────────
    var clock   = new THREE.Clock();
    var elapsed = 0;

    function draw() {
      requestAnimationFrame(draw);
      var dt = Math.min(clock.getDelta(), 0.05);
      elapsed += dt;

      // Always update shader time for idle pulse animation
      ringMat.uniforms.uTime.value   = elapsed;
      hazardMat.uniforms.uTime.value = elapsed;

      if (state === 'playing') {
        levelTimer += dt;
        score      += dt * speed() * 0.1;
        if (levelTimer >= LEVEL_TIME) { level++; levelTimer = 0; }

        // Steer
        var steer = 0;
        if (keys['ArrowLeft']  || keys['KeyA']) steer = -1;
        if (keys['ArrowRight'] || keys['KeyD']) steer =  1;
        playerX = Math.max(-STEER_BOUNDS, Math.min(STEER_BOUNDS, playerX + steer * STEER_SPEED * dt));

        // Camera follows player X with slight lag; bank on turns
        camera.position.x += (playerX - camera.position.x) * 9 * dt;
        camera.rotation.z += (-steer * 0.045 - camera.rotation.z) * 12 * dt;

        var spd = speed();

        for (var i = 0; i < rings.length; i++) {
          // Scroll toward camera
          rings[i].position.z += spd * dt;
          // Spin
          rings[i].rotation.z += 0.012 * dt * 60;

          // Recycle past camera
          if (rings[i].position.z > 120) {
            var minZ = Infinity;
            for (var j = 0; j < rings.length; j++) minZ = Math.min(minZ, rings[j].position.z);
            spawnRing(rings[i], minZ - RING_SPACING);
          }

          // Collision: only test ring near the camera plane
          var rz = rings[i].position.z;
          if (rz > -90 && rz < 90) {
            var dx   = camera.position.x - rings[i].position.x;
            var dy   = camera.position.y - rings[i].position.y;
            if (Math.sqrt(dx * dx + dy * dy) > SAFE_DIST) {
              crash();
              return;
            }
          }
        }

        // ── Hazards ──────────────────────────────────────────────────────────
        for (var hi = 0; hi < hazards.length; hi++) {
          if (!hazards[hi].visible) continue;
          hazards[hi].position.z += spd * dt;
          hazards[hi].rotation.x += 0.02 * dt * 60;
          hazards[hi].rotation.y += 0.015 * dt * 60;

          if (hazards[hi].position.z > 150) { hazards[hi].visible = false; continue; }

          var hz = hazards[hi].position.z;
          if (hz > -60 && hz < 60) {
            var hdx = camera.position.x - hazards[hi].position.x;
            var hdy = camera.position.y - hazards[hi].position.y;
            if (Math.sqrt(hdx * hdx + hdy * hdy) < HAZARD_R + PLAYER_R) {
              crash();
              return;
            }
          }
        }

        hudScore.textContent = 'score  ' + Math.floor(score);
        hudLevel.textContent = 'level  ' + level;
      }

      renderer.clearDepth();
      renderer.render(fadeScene, fadeCamera);
      renderer.render(scene, camera);
    }

    resetRings();
    draw();

  }());
  </script>
</body>
</html>
