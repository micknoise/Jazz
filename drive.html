<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script src="./engine.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jazz — Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    #hud { position: absolute; top: 16px; right: 16px; color: white; font-family: monospace; font-size: 13px; text-align: right; pointer-events: none; line-height: 2; }
    #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-family: monospace; text-align: center; pointer-events: none; }
    #overlay h1 { font-size: 36px; font-weight: normal; letter-spacing: 0.2em; margin-bottom: 12px; }
    #overlay p  { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; }
    #touch-left, #touch-right {
      position: fixed; bottom: 0; width: 42%; height: 130px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 24px;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.1);
      user-select: none; -webkit-user-select: none; touch-action: none;
      transition: background 0.08s, color 0.08s;
    }
    #touch-left  { left: 0; border-right: 1px solid rgba(255,255,255,0.06); }
    #touch-right { right: 0; }
    #touch-left.active, #touch-right.active { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton">play</button>
    <button id="resetButton">reset</button>
  </div>
  <div id="hud">
    <div id="hud-score">score  0</div>
    <div id="hud-level">level  1</div>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">drive</h1>
    <p  id="overlay-msg">tap to start  ·  ← → to steer</p>
  </div>
  <div id="touch-left">◀</div>
  <div id="touch-right">▶</div>

  <script>
    // ── Game constants ─────────────────────────────────────────────────────────
    var NUM_RINGS    = 14;
    var RING_SPACING = 190;
    var RING_RADIUS  = 112;
    var RING_TUBE    = 7;
    var SAFE_DIST    = (RING_RADIUS - RING_TUBE) - 18;  // ~87
    var NUM_HAZARDS  = 8;
    var HAZARD_R     = 20;
    var PLAYER_R     = 18;
    var STEER_SPEED  = 170;
    var STEER_BOUNDS = 95;
    var BASE_SPEED   = 290;
    var SPEED_INC    = 38;
    var LEVEL_TIME   = 15;

    // ── Game state ─────────────────────────────────────────────────────────────
    var gameState = 'idle';
    var score = 0, level = 1, levelTimer = 0;
    var playerX = 0, steerInput = 0;
    var eventCooldown = 0, peakBaseline = 0;

    var hudScore     = document.getElementById('hud-score');
    var hudLevel     = document.getElementById('hud-level');
    var overlay      = document.getElementById('overlay');
    var overlayTitle = document.getElementById('overlay-title');
    var overlayMsg   = document.getElementById('overlay-msg');

    function gameSpeed() { return BASE_SPEED + (level - 1) * SPEED_INC; }
    function maxOffset() { return Math.min((level - 1) * 13, 82); }

    // ── Touch controls ─────────────────────────────────────────────────────────
    var gameKeys = {};
    var tl = document.getElementById('touch-left');
    var tr = document.getElementById('touch-right');

    function bindSteer(el, code) {
      el.addEventListener('touchstart',  function (e) { e.preventDefault(); gameKeys[code] = true;  el.classList.add('active'); },    { passive: false });
      el.addEventListener('touchend',    function (e) { e.preventDefault(); gameKeys[code] = false; el.classList.remove('active'); }, { passive: false });
      el.addEventListener('touchcancel', function (e) { e.preventDefault(); gameKeys[code] = false; el.classList.remove('active'); }, { passive: false });
    }
    bindSteer(tl, 'ArrowLeft');
    bindSteer(tr, 'ArrowRight');

    document.addEventListener('touchstart', function () {
      if (gameState !== 'playing') startGame();
    }, { passive: true });

    document.addEventListener('keydown', function (e) {
      if ((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') startGame();
    });

    // ── Engine init ────────────────────────────────────────────────────────────
    initJazzEngine({
      title: 'Drive',
      trailOpacity: 0.10,
      camera: {
        position: new THREE.Vector3(0, 0, 0),
        lookAt:   new THREE.Vector3(0, 0, -100)
      },
      speed:  0,       // disable engine WASD movement; game controls camera directly
      bounds: 200,
      audio: {
        sparsity_1:        0.2,
        sparsity_2:        0.25,
        tempo:             125,
        maxTicksPerBeat:   14,
        fastFreqBase:      400,
        fastFreqRange:     800,
        fastModIRange:     20000,
        decayFeedbackValue: 0.995
      },

      sceneSetup: function (scene, camera, ss) {

        // ── Ring material ────────────────────────────────────────────────────
        var ringMat = new THREE.ShaderMaterial({
          vertexShader:   ss.vertexShader,
          fragmentShader: ss.fragmentShader,
          uniforms: ss.makeUniforms({ uFFTUV: { value: 0.0 }, uDeform: { value: 0.0 } }),
          transparent: true, depthWrite: false
        });

        // ── Hazard material ──────────────────────────────────────────────────
        var hazardMat = new THREE.ShaderMaterial({
          vertexShader:   ss.vertexShader,
          fragmentShader: ss.fragmentShader,
          uniforms: ss.makeUniforms({ uFFTUV: { value: 0.0 }, uDeform: { value: 0.0 }, uColor: { value: new THREE.Color(1.0, 0.45, 0.0) } }),
          transparent: true, depthWrite: false
        });

        // ── Build rings ──────────────────────────────────────────────────────
        var rings = [];
        for (var i = 0; i < NUM_RINGS; i++) {
          var m = new THREE.Mesh(
            addBarycentricCoords(new THREE.TorusGeometry(RING_RADIUS, RING_TUBE, 8, 48)),
            ringMat
          );
          m.position.z = -(i + 1) * RING_SPACING;
          scene.add(m);
          rings.push(m);
        }

        // ── Build hazards ────────────────────────────────────────────────────
        var hazards = [];
        for (var h = 0; h < NUM_HAZARDS; h++) {
          var hm = new THREE.Mesh(
            addBarycentricCoords(new THREE.IcosahedronGeometry(18, 1)),
            hazardMat
          );
          hm.visible = false;
          scene.add(hm);
          hazards.push(hm);
        }

        function spawnHazard() {
          for (var h = 0; h < hazards.length; h++) {
            if (!hazards[h].visible) {
              hazards[h].position.set(
                (Math.random() * 2 - 1) * (STEER_BOUNDS * 0.85),
                (Math.random() - 0.5) * 50,
                -2200
              );
              hazards[h].rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
              hazards[h].visible = true;
              return;
            }
          }
        }

        function spawnRing(ring, zPos) {
          var mo = maxOffset();
          ring.position.set(mo > 0 ? (Math.random() * 2 - 1) * mo : 0, 0, zPos);
          ring.rotation.z = Math.random() * Math.PI * 2;
          ring.rotation.x = (Math.random() - 0.5) * 0.12;
        }

        function resetAll() {
          for (var i = 0; i < rings.length;   i++) spawnRing(rings[i], -(i + 1) * RING_SPACING);
          for (var h = 0; h < hazards.length; h++) hazards[h].visible = false;
          ringMat.uniforms.uColor.value.setRGB(1, 1, 1);
          playerX = 0; score = 0; level = 1; levelTimer = 0;
          camera.position.set(0, 0, 0);
          camera.rotation.set(0, 0, 0);
        }

        function startGame() {
          resetAll();
          gameState = 'playing';
          overlay.style.display = 'none';
        }
        window.startGame = startGame;  // expose for touch/key handlers above

        function crash() {
          gameState = 'dead';
          ringMat.uniforms.uColor.value.setRGB(1, 0.12, 0.12);
          overlayTitle.textContent = 'crash';
          overlayMsg.textContent   = 'score  ' + Math.floor(score) + '   ·   tap to retry';
          overlay.style.display    = '';
          setTimeout(function () { ringMat.uniforms.uColor.value.setRGB(1, 1, 1); }, 900);
        }

        // ── Per-frame update (called by engine.js render loop) ───────────────
        return {
          update: function (fftArray, elapsed, dt) {

            // Keep camera locked to game position; disable engine's free-fly
            camera.position.z = 0;
            camera.position.y = 0;

            // Update shader time on both materials
            ringMat.uniforms.uTime.value   = elapsed;
            hazardMat.uniforms.uTime.value = elapsed;

            if (gameState !== 'playing') return;

            // Scoring / levelling
            levelTimer += dt;
            score      += dt * gameSpeed() * 0.1;
            if (levelTimer >= LEVEL_TIME) { level++; levelTimer = 0; }

            // Steering (game keys + engine keys both work)
            steerInput = 0;
            if (gameKeys['ArrowLeft']  || window._jazzKeys && window._jazzKeys['KeyA']) steerInput = -1;
            if (gameKeys['ArrowRight'] || window._jazzKeys && window._jazzKeys['KeyD']) steerInput =  1;
            playerX = Math.max(-STEER_BOUNDS, Math.min(STEER_BOUNDS, playerX + steerInput * STEER_SPEED * dt));
            camera.position.x += (playerX - camera.position.x) * 9 * dt;
            camera.rotation.z += (-steerInput * 0.045 - camera.rotation.z) * 12 * dt;
            camera.rotation.x  = 0;
            camera.rotation.y  = 0;

            // FFT beat detection → spawn hazard
            var peak = 0;
            for (var fi = 0; fi < fftArray.length; fi++) if (fftArray[fi] > peak) peak = fftArray[fi];
            peakBaseline  = peakBaseline * 0.99 + peak * 0.01;
            eventCooldown = Math.max(0, eventCooldown - dt);
            if (eventCooldown <= 0 && peak > peakBaseline * 1.5 && peak > 0.02) {
              spawnHazard();
              eventCooldown = 0.4;
            }

            var spd = gameSpeed();

            // Rings
            for (var i = 0; i < rings.length; i++) {
              rings[i].position.z += spd * dt;
              rings[i].rotation.z += window.jazzRotDir[2] * 0.012 * dt * 60;
              if (rings[i].position.z > 120) {
                var minZ = Infinity;
                for (var j = 0; j < rings.length; j++) minZ = Math.min(minZ, rings[j].position.z);
                spawnRing(rings[i], minZ - RING_SPACING);
              }
              var rz = rings[i].position.z;
              if (rz > -90 && rz < 90) {
                var dx = camera.position.x - rings[i].position.x;
                var dy = camera.position.y - rings[i].position.y;
                if (Math.sqrt(dx * dx + dy * dy) > SAFE_DIST) { crash(); return; }
              }
            }

            // Hazards
            for (var hi = 0; hi < hazards.length; hi++) {
              if (!hazards[hi].visible) continue;
              hazards[hi].position.z += spd * dt;
              hazards[hi].rotation.x += 0.02 * dt * 60;
              hazards[hi].rotation.y += 0.015 * dt * 60;
              if (hazards[hi].position.z > 150) { hazards[hi].visible = false; continue; }
              var hz = hazards[hi].position.z;
              if (hz > -60 && hz < 60) {
                var hdx = camera.position.x - hazards[hi].position.x;
                var hdy = camera.position.y - hazards[hi].position.y;
                if (Math.sqrt(hdx * hdx + hdy * hdy) < HAZARD_R + PLAYER_R) { crash(); return; }
              }
            }

            hudScore.textContent = 'score  ' + Math.floor(score);
            hudLevel.textContent = 'level  ' + level;
          },

          reset: function () { resetAll(); gameState = 'idle'; overlay.style.display = ''; },

          gui: function (folder) {
            folder.add(ringMat.uniforms.uDeform, 'value', 0, 800, 1).name('Ring deform');
            folder.add(ringMat.uniforms.uLineWidth, 'value', 0.5, 6, 0.1).name('Line width');
          }
        };
      }
    });
  </script>
</body>
</html>
