<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script src="./engine.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz — Pulse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    #hint { position: absolute; bottom: 16px; left: 16px; color: rgba(255,255,255,0.3); font-size: 11px; font-family: monospace; pointer-events: none; }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton">play</button>
    <button id="resetButton">reset</button>
  </div>
  <div id="hint">click canvas · wasd = move · mouse = look · q/e = up/down</div>
  <script>
    initJazzEngine({
      title: 'Pulse',
      trailOpacity: 0.06,
      camera: {
        position: new THREE.Vector3(0, 0, 500)
      },
      bounds: 800,
      speed: 150,
      audio: {
        sparsity_1: 0.8,
        sparsity_2: 0.85,
        tempo: 70,
        maxTicksPerBeat: 4,
        fastFreqBase: 200,
        fastFreqRange: 300,
        fastModIRange: 5000,
        positiveFeedbackValue: 1.000005,
        decayFeedbackValue: 0.9997
      },
      sceneSetup: function (scene, camera, ss) {
        var radii = [60, 120, 180, 240, 300];
        var spheres = [];

        // Shared material — each sphere gets its own instance with same params
        radii.forEach(function (r, i) {
          var geo = addBarycentricCoords(
            new THREE.SphereGeometry(r, 16, 16)
          );

          // Subtle hue shift across shells from blue-white to cyan
          var t = i / (radii.length - 1);
          var col = new THREE.Color().setHSL(0.55 + t * 0.1, 0.6, 0.75);

          var mat = new THREE.ShaderMaterial({
            vertexShader: ss.vertexShader,
            fragmentShader: ss.fragmentShader,
            uniforms: ss.makeUniforms({
              uDeform: { value: 1500.0 },
              uColor: { value: col },
              uFFTUV: { value: 1.0 }   // use uv.y so deform wraps shells nicely
            }),
            transparent: true,
            depthWrite: false
          });

          var mesh = new THREE.Mesh(geo, mat);
          scene.add(mesh);
          spheres.push({ mesh: mesh, mat: mat });
        });

        return {
          update: function (fftArray, elapsed, dt) {
            spheres.forEach(function (s, i) {
              // Each shell has a different rotation phase
              s.mesh.rotation.x += window.jazzRotDir[0] * (0.001 * (i + 1) + window.jazzRMS * 0.05 * (i + 1)) * dt * 60;
              s.mesh.rotation.y += window.jazzRotDir[1] * (0.002 * (i + 1) + window.jazzRMS * 0.08) * dt * 60;
              s.mat.uniforms.uTime.value = elapsed + i * 1.5;
            });
          },
          reset: function () {
            spheres.forEach(function (s) {
              s.mesh.rotation.set(0, 0, 0);
              s.mat.uniforms.uTime.value = 0;
            });
          },
          gui: function (folder, audioParams, sendFn) {
            var params = { deform: 1500, lineWidth: 2 };
            folder.add(params, 'deform', 0, 3000, 1).name('Deform').onChange(function (v) {
              spheres.forEach(function (s) { s.mat.uniforms.uDeform.value = v; });
            });
            folder.add(params, 'lineWidth', 0.5, 8, 0.1).name('Line width').onChange(function (v) {
              spheres.forEach(function (s) { s.mat.uniforms.uLineWidth.value = v; });
            });
          }
        };
      }
    });
  </script>
</body>
</html>
