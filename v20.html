<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script src="./engine.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz — Aurora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    #hint { position: absolute; bottom: 16px; left: 16px; color: rgba(255,255,255,0.3); font-size: 11px; font-family: monospace; pointer-events: none; }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton">play</button>
    <button id="resetButton">reset</button>
  </div>
  <div id="hint">click canvas · wasd = move · mouse = look · q/e = up/down</div>
  <script>
    initJazzEngine({
      title: 'Aurora',
      trailOpacity: 0.05,
      camera: {
        position: new THREE.Vector3(0, 0, 600)
      },
      bounds: 1000,
      speed: 150,
      audio: {
        sparsity_1: 0.6,
        sparsity_2: 0.65,
        tempo: 70,
        maxTicksPerBeat: 6,
        slowFreq2: 70,
        slowModI: 0.7,
        fastFreqBase: 150,
        fastFreqRange: 250,
        fastModIRange: 5000,
        positiveFeedbackValue: 1.000002,
        decayFeedbackValue: 0.9998
      },
      sceneSetup: function (scene, camera, ss) {
        var NUM_RIBBONS = 6;
        var colors = [
          [1.0, 1.0, 1.0],
          [0.9, 0.9, 1.0],
          [0.8, 1.0, 0.9],
          [1.0, 0.9, 0.8],
          [0.9, 1.0, 1.0],
          [1.0, 1.0, 0.9]
        ];
        var ribbons = [];

        for (var i = 0; i < NUM_RIBBONS; i++) {
          var geo = addBarycentricCoords(new THREE.PlaneGeometry(2000, 300, 60, 16));
          var c = colors[i];
          var mat = new THREE.ShaderMaterial({
            vertexShader: ss.vertexShader,
            fragmentShader: ss.fragmentShader,
            uniforms: ss.makeUniforms({
              uDeform: { value: 400.0 },
              uColor: { value: new THREE.Color(c[0], c[1], c[2]) },
              uFFTUV: { value: 0.0 }
            }),
            transparent: true,
            depthWrite: false
          });
          var mesh = new THREE.Mesh(geo, mat);
          mesh.position.y = 200 + i * 80;
          mesh.rotation.x = -0.3 + i * 0.1;
          mesh.rotation.z = -Math.PI / 3 + i * (Math.PI / 9);
          scene.add(mesh);
          ribbons.push({ mesh: mesh, mat: mat });
        }

        return {
          update: function (fftArray, elapsed, dt) {
            for (var i = 0; i < ribbons.length; i++) {
              ribbons[i].mat.uniforms.uTime.value = elapsed;
            }
          },
          reset: function () {
            for (var i = 0; i < ribbons.length; i++) {
              ribbons[i].mesh.position.y = 200 + i * 80;
              ribbons[i].mesh.rotation.x = -0.3 + i * 0.1;
              ribbons[i].mesh.rotation.z = -Math.PI / 3 + i * (Math.PI / 9);
            }
          },
          gui: function (folder) {
            folder.add(ribbons[0].mat.uniforms.uDeform, 'value', 0, 2000, 1).name('Deform').onChange(function (v) {
              for (var i = 0; i < ribbons.length; i++) {
                ribbons[i].mat.uniforms.uDeform.value = v;
              }
            });
            folder.add(ribbons[0].mat.uniforms.uLineWidth, 'value', 0.5, 6, 0.1).name('Line width').onChange(function (v) {
              for (var i = 0; i < ribbons.length; i++) {
                ribbons[i].mat.uniforms.uLineWidth.value = v;
              }
            });
          }
        };
      }
    });
  </script>
</body>
</html>
