<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script src="./engine.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jazz — Explore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace;
             border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5);
             font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    #hud { position: absolute; top: 16px; right: 16px; color: white; font-family: monospace;
           font-size: 12px; text-align: right; pointer-events: none; line-height: 1.9; }
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                 color: rgba(255,255,255,0.35); font-size: 16px; pointer-events: none; }
    #door-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
                 color: rgba(255,255,255,0.65); font-family: monospace; font-size: 12px;
                 letter-spacing: 0.15em; pointer-events: none; display: none; }
    #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
               color: white; font-family: monospace; text-align: center; pointer-events: none; }
    #overlay h1 { font-size: 36px; font-weight: normal; letter-spacing: 0.2em; margin-bottom: 12px; }
    #overlay p  { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; line-height: 1.9; }
    #touch-move-zone, #touch-look-zone {
      position: fixed; bottom: 0; z-index: 8; touch-action: none; pointer-events: none;
    }
    #touch-move-zone { left: 0; width: 42%; height: 46%; }
    #touch-look-zone { right: 0; width: 58%; height: 100%; }
    #joy-outer, #joy-inner {
      position: fixed; border-radius: 50%; pointer-events: none;
      transform: translate(-50%,-50%); display: none;
    }
    #joy-outer { width: 88px; height: 88px;
                 border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); }
    #joy-inner { width: 38px; height: 38px;
                 border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton">play</button>
    <button id="resetButton">reset</button>
  </div>
  <div id="hud">
    <div id="hud-rooms">rooms  0</div>
    <div id="hud-seg">corridor  1</div>
  </div>
  <div id="crosshair">+</div>
  <div id="door-hint">[ tap to open ]</div>
  <div id="overlay">
    <h1>explore</h1>
    <p>tap to start · left thumb to move<br>right thumb to look · tap a door to open it</p>
  </div>
  <div id="touch-move-zone"></div>
  <div id="touch-look-zone"></div>
  <div id="joy-outer"></div>
  <div id="joy-inner"></div>

  <script>
  // ── Constants ────────────────────────────────────────────────────────────────
  var CORR_HALF  = 48;
  var CORR_H     = 115;
  var EYE_Y      = 72;
  var SEG_LEN    = 340;
  var SEG_SPEC   = 620;
  var NUM_SEGS   = 22;
  var DOOR_W     = 44;
  var DOOR_H     = 86;
  var MAX_DEFORM = 600;
  var PLAYER_R   = 12;   // collision radius
  var MOVE_SPEED = 115;
  var JOY_RADIUS = 44;
  var LOOK_SENS  = 0.006;
  // Culling: show/hide distances (XZ plane for rooms, Z-axis for corridors)
  var ROOM_SHOW  = 640;
  var ROOM_HIDE  = 740;
  var CORR_SHOW  = 950;
  var CORR_HIDE  = 1100;

  // ── Floor plan ───────────────────────────────────────────────────────────────
  function generateFloorPlan() {
    var plan = { segments: [], rooms: [] };
    var z = 0, roomIdx = 0;

    for (var i = 0; i < NUM_SEGS; i++) {
      var special = (i > 0 && i % 5 === 0);
      var len = special ? SEG_SPEC : SEG_LEN;
      var seg = { id: i, zStart: -z, zEnd: -(z + len), length: len, special: special, doors: [] };

      var numDoors = special ? 1 : (Math.random() > 0.25 ? 1 : 0);
      if (!special && Math.random() > 0.55) numDoors = 2;

      var usedSides = {};
      for (var d = 0; d < numDoors; d++) {
        var side = Math.random() > 0.5 ? 'left' : 'right';
        if (usedSides[side]) side = (side === 'left') ? 'right' : 'left';
        if (usedSides[side]) continue;
        usedSides[side] = true;

        var tPos  = 0.25 + Math.random() * 0.5;
        var doorZ = -(z + len * tPos);

        // Rooms are ~55% bigger than the original version
        var rW = special ? (460 + Math.random() * 160) : (250 + Math.random() * 130);
        var rH = special ? (210 + Math.random() * 70)  : (145 + Math.random() * 50);
        var rD = special ? (520 + Math.random() * 160) : (290 + Math.random() * 130);

        var numObjs = special ? 1 : Math.floor(2 + Math.random() * 4);
        var objTypes = ['torus','icosahedron','octahedron','sphere','torusKnot'];
        var objects = [];
        for (var o = 0; o < numObjs; o++) {
          objects.push({
            type:  objTypes[Math.floor(Math.random() * objTypes.length)],
            x:     (Math.random() - 0.5) * rW * 0.55,
            y:     rH * (0.3 + Math.random() * 0.35),
            z:     (Math.random() - 0.5) * rD * 0.55,
            scale: special ? (2.4 + Math.random() * 1.2) : (0.8 + Math.random() * 1.0),
            hue:   Math.random(),
            spinX: (Math.random() - 0.5) * 0.55,
            spinY: (Math.random() - 0.5) * 0.55,
            spinZ: (Math.random() - 0.5) * 0.25
          });
        }

        var room = { id: 'r' + roomIdx++, side: side, zCenter: doorZ,
                     w: rW, h: rH, d: rD, special: special,
                     objects: objects, hue: Math.random(), open: false };
        plan.rooms.push(room);
        seg.doors.push({ side: side, zPos: doorZ, roomId: room.id });
      }

      plan.segments.push(seg);
      z += len;
    }
    return plan;
  }

  // ── Touch controls ───────────────────────────────────────────────────────────
  var joyOuter = document.getElementById('joy-outer');
  var joyInner = document.getElementById('joy-inner');

  var joyActive = false, joyId = null, joyOriginX = 0, joyOriginY = 0;
  var joyDX = 0, joyDY = 0;

  var lookActive = false, lookId = null, lookLastX = 0, lookLastY = 0;
  var lookAccYaw = 0, lookAccPitch = 0;
  var myPitch = 0, myYaw = 0;
  var touchEverUsed = false;

  var lookTapStartX = 0, lookTapStartY = 0, lookMoved = false;
  var openDoorFn = null;

  function showJoy(ox, oy, dx, dy) {
    joyOuter.style.left = ox + 'px'; joyOuter.style.top = oy + 'px';
    joyOuter.style.display = 'block';
    joyInner.style.left = (ox + dx * JOY_RADIUS) + 'px';
    joyInner.style.top  = (oy + dy * JOY_RADIUS) + 'px';
    joyInner.style.display = 'block';
  }
  function hideJoy() { joyOuter.style.display = 'none'; joyInner.style.display = 'none'; }
  function isMoveZone(x) { return x < window.innerWidth * 0.42; }

  document.addEventListener('touchstart', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (isMoveZone(t.clientX)) {
        if (!joyActive) {
          joyActive = true; joyId = t.identifier;
          joyOriginX = t.clientX; joyOriginY = t.clientY;
          joyDX = 0; joyDY = 0;
          showJoy(joyOriginX, joyOriginY, 0, 0);
        }
      } else {
        if (!lookActive) {
          lookActive = true; lookId = t.identifier;
          lookLastX = t.clientX; lookLastY = t.clientY;
          lookTapStartX = t.clientX; lookTapStartY = t.clientY;
          lookMoved = false; touchEverUsed = true;
        }
      }
    }
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (joyActive && t.identifier === joyId) {
        var dx = t.clientX - joyOriginX, dy = t.clientY - joyOriginY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          var c = Math.min(dist, JOY_RADIUS);
          joyDX = dx / dist * (c / JOY_RADIUS);
          joyDY = dy / dist * (c / JOY_RADIUS);
          showJoy(joyOriginX, joyOriginY, joyDX, joyDY);
        }
      }
      if (lookActive && t.identifier === lookId) {
        lookAccYaw   += t.clientX - lookLastX;
        lookAccPitch += t.clientY - lookLastY;
        lookLastX = t.clientX; lookLastY = t.clientY;
        if (Math.abs(t.clientX - lookTapStartX) > 12 ||
            Math.abs(t.clientY - lookTapStartY) > 12) lookMoved = true;
      }
    }
  }, { passive: true });

  // Auto-start audio on first user gesture (same pattern as drive.html)
  function startAudioIfNeeded() {
    var pb = document.getElementById('playButton');
    if (pb && pb.textContent === 'play') pb.click();
  }

  document.addEventListener('touchend', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (joyActive && t.identifier === joyId) {
        joyActive = false; joyId = null; joyDX = 0; joyDY = 0; hideJoy();
      }
      if (lookActive && t.identifier === lookId) {
        lookActive = false; lookId = null;
        if (!lookMoved && openDoorFn) openDoorFn();
      }
    }
    document.getElementById('overlay').style.display = 'none';
    startAudioIfNeeded();
  }, { passive: true });

  document.addEventListener('touchcancel', function (e) {
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier === joyId)  { joyActive = false; joyId = null; joyDX = 0; joyDY = 0; hideJoy(); }
      if (t.identifier === lookId) { lookActive = false; lookId = null; }
    }
  }, { passive: true });

  // ── HUD ──────────────────────────────────────────────────────────────────────
  var hudRooms = document.getElementById('hud-rooms');
  var hudSeg   = document.getElementById('hud-seg');
  var doorHint = document.getElementById('door-hint');
  var overlay  = document.getElementById('overlay');

  var plan = generateFloorPlan();
  console.log('[Jazz Explore] floor plan:', JSON.stringify(plan, null, 2));

  var openedRooms = 0;

  // ── Engine ───────────────────────────────────────────────────────────────────
  initJazzEngine({
    title: 'Explore', trailOpacity: 0.10,
    camera: { position: new THREE.Vector3(0, EYE_Y, 40) },
    bounds: 9000, speed: MOVE_SPEED,
    audio: {
      sparsity_1: 0, sparsity_2: 0.3, tempo: 95, maxTicksPerBeat: 8,
      fastFreqBase: 180, fastFreqRange: 700, fastModIRange: 16000,
      decayFeedbackValue: 0.997
    },

    sceneSetup: function (scene, camera, ss) {
      scene.fog = new THREE.FogExp2(0x000000, 0.0016);

      // Shared depth-mask material: writes Z, invisible.
      // Used behind every wall/door so transparent wireframes properly occlude.
      var maskMat = new THREE.MeshBasicMaterial({
        colorWrite: false, depthWrite: true, side: THREE.DoubleSide
      });

      var wallMats = [];   // wireframe materials updated for audio wobble

      // ── Helpers ─────────────────────────────────────────────────────────────
      function wireMat(color, lw) {
        var m = new THREE.ShaderMaterial({
          uniforms: ss.makeUniforms({
            uColor:     { value: new THREE.Color(color) },
            uDeform:    { value: 0 }, uFFTUV: { value: 1.0 },
            uLineWidth: { value: lw || 1.2 }
          }),
          vertexShader: ss.vertexShader, fragmentShader: ss.fragmentShader,
          transparent: true, depthWrite: false, side: THREE.DoubleSide
        });
        wallMats.push(m);
        return m;
      }

      // Add an occluding surface: invisible depth-mask mesh + visible wireframe mesh.
      // Both share the same transform and live in the given THREE.Group.
      // Returns the wireframe mesh so callers can toggle its visibility.
      function addSurface(geo, mat, group, px, py, pz, rx, ry, rz) {
        var baryGeo = addBarycentricCoords(geo); // new non-indexed geo; original untouched
        var meshes = [
          new THREE.Mesh(geo, maskMat),     // depth-only
          new THREE.Mesh(baryGeo, mat)      // visible wireframe
        ];
        meshes.forEach(function (m) {
          m.position.set(px, py, pz);
          m.rotation.set(rx || 0, ry || 0, rz || 0);
          group.add(m);
        });
        return meshes[1]; // wireframe mesh
      }

      // Returns a PlaneGeometry subdivided into near-square tiles of ~TILE units.
      var TILE = 90;
      function tiledPlane(w, h) {
        return new THREE.PlaneGeometry(w, h,
          Math.max(1, Math.round(w / TILE)),
          Math.max(1, Math.round(h / TILE)));
      }

      // Build one side wall for a corridor segment, leaving DOOR_W × DOOR_H gaps
      // at each supplied door Z position (world space).
      // doorZPositions: array of world-Z values for doors on this side.
      function buildSideWall(group, mat, side, zStart, zEnd, doorZPositions) {
        var wallX  = side === 'left' ? -CORR_HALF : CORR_HALF;
        var wallRY = side === 'left' ?  Math.PI / 2 : -Math.PI / 2;
        // Sort descending (zStart > zEnd, i.e. near-to-far)
        var dzs = doorZPositions.slice().sort(function (a, b) { return b - a; });
        var cursor = zStart;

        for (var d = 0; d < dzs.length; d++) {
          var dz      = dzs[d];
          var dNear   = dz + DOOR_W / 2;
          var dFar    = dz - DOOR_W / 2;
          var aboveH  = CORR_H - DOOR_H;

          // Full-height piece from cursor to near edge of door
          var w1 = cursor - dNear;
          if (w1 > 0.5) {
            addSurface(tiledPlane(w1, CORR_H), mat, group,
              wallX, CORR_H / 2, (cursor + dNear) / 2, 0, wallRY, 0);
          }
          // Above-door strip (DOOR_H → CORR_H) across the door opening
          if (aboveH > 0.5) {
            addSurface(tiledPlane(DOOR_W, aboveH), mat, group,
              wallX, DOOR_H + aboveH / 2, dz, 0, wallRY, 0);
          }
          cursor = dFar;
        }

        // Remaining piece after all doors to far end
        var wLast = cursor - zEnd;
        if (wLast > 0.5) {
          addSurface(tiledPlane(wLast, CORR_H), mat, group,
            wallX, CORR_H / 2, (cursor + zEnd) / 2, 0, wallRY, 0);
        }
      }

      // ── Build room groups ────────────────────────────────────────────────────
      var roomGroups  = [];
      var roomById    = {};
      var allRoomObjs = []; // { mat, spinX, spinY, spinZ, mesh }

      plan.rooms.forEach(function (room) {
        var group = new THREE.Group();
        scene.add(group);

        var xSign   = room.side === 'left' ? -1 : 1;
        var centerX = xSign * (CORR_HALF + room.w / 2);
        var wallCol = new THREE.Color().setHSL(room.hue, 0.2, 0.08);
        var mat     = wireMat(wallCol);

        // Four room walls (entrance side left open — covered by door mesh)
        addSurface(tiledPlane(room.w, room.h), mat, group,
          centerX, room.h / 2, room.zCenter - xSign * room.d / 2,
          0, xSign > 0 ? 0 : Math.PI, 0);
        addSurface(tiledPlane(room.d, room.h), mat, group,
          centerX + xSign * room.w / 2, room.h / 2, room.zCenter,
          0, xSign * Math.PI / 2, 0);
        addSurface(tiledPlane(room.w, room.d), mat, group,
          centerX, 0, room.zCenter, -Math.PI / 2, 0, 0);
        addSurface(tiledPlane(room.w, room.d), mat, group,
          centerX, room.h, room.zCenter, Math.PI / 2, 0, 0);

        var stripH = room.h - DOOR_H;
        if (stripH > 2) {
          addSurface(tiledPlane(DOOR_W, stripH), mat, group,
            centerX - xSign * room.w / 2, DOOR_H + stripH / 2, room.zCenter,
            0, -xSign * Math.PI / 2, 0);
        }

        // Room objects (no depth mask — they're floating art, not walls)
        var objs = [];
        room.objects.forEach(function (obj) {
          var sz = 22 * obj.scale;
          var geo;
          switch (obj.type) {
            case 'torus':       geo = new THREE.TorusGeometry(sz, sz * 0.32, 8, 36);            break;
            case 'icosahedron': geo = new THREE.IcosahedronGeometry(sz, 2);                      break;
            case 'octahedron':  geo = new THREE.OctahedronGeometry(sz, 2);                       break;
            case 'sphere':      geo = new THREE.SphereGeometry(sz, 12, 8);                       break;
            case 'torusKnot':   geo = new THREE.TorusKnotGeometry(sz * 0.65, sz * 0.18, 90, 8); break;
            default:            geo = new THREE.IcosahedronGeometry(sz, 2);
          }
          var objMat = new THREE.ShaderMaterial({
            uniforms: ss.makeUniforms({
              uColor: { value: new THREE.Color().setHSL(obj.hue, 0.72, 0.44) },
              uDeform: { value: 0 }, uFFTUV: { value: 0.0 }, uLineWidth: { value: 2.2 }
            }),
            vertexShader: ss.vertexShader, fragmentShader: ss.fragmentShader,
            transparent: true, depthWrite: false
          });
          var mesh = new THREE.Mesh(addBarycentricCoords(geo), objMat);
          mesh.position.set(centerX + obj.x, obj.y, room.zCenter + obj.z);
          group.add(mesh);
          objs.push({ mesh: mesh, mat: objMat, spinX: obj.spinX, spinY: obj.spinY, spinZ: obj.spinZ });
          allRoomObjs.push(objs[objs.length - 1]);
        });

        var rg = { room: room, group: group, centerX: centerX, objects: objs,
                   doorPivot: null, doorMesh: null, doorMaskMesh: null,
                   opening: false, openY: 0 };
        roomGroups.push(rg);
        roomById[room.id] = rg;
      });

      // ── Build corridor groups ────────────────────────────────────────────────
      var corrGroups = [];
      plan.segments.forEach(function (seg) {
        var group = new THREE.Group();
        scene.add(group);
        var zMid = (seg.zStart + seg.zEnd) / 2;
        var len  = seg.length;
        var col  = seg.special
          ? new THREE.Color().setHSL(0.62, 0.22, 0.12)
          : new THREE.Color().setHSL(0.57, 0.18, 0.07);
        var mat = wireMat(col);

        // Floor and ceiling (no doors — full planes)
        addSurface(tiledPlane(CORR_HALF * 2, len), mat, group,
          0, 0, zMid, -Math.PI / 2, 0, 0);
        addSurface(tiledPlane(CORR_HALF * 2, len), mat, group,
          0, CORR_H, zMid, Math.PI / 2, 0, 0);

        // Side walls — split around any door openings
        var leftDoors = [], rightDoors = [];
        seg.doors.forEach(function (d) {
          if (d.side === 'left') leftDoors.push(d.zPos);
          else                   rightDoors.push(d.zPos);
        });
        buildSideWall(group, mat, 'left',  seg.zStart, seg.zEnd, leftDoors);
        buildSideWall(group, mat, 'right', seg.zStart, seg.zEnd, rightDoors);

        corrGroups.push({ zMid: zMid, group: group });
      });

      // End + start caps (always visible — close to origin)
      var lastSeg    = plan.segments[plan.segments.length - 1];
      var lastSegZEnd = lastSeg.zEnd;
      var capMat  = wireMat(new THREE.Color().setHSL(0.57, 0.2, 0.18));
      var capGroup = new THREE.Group(); scene.add(capGroup);
      addSurface(tiledPlane(CORR_HALF * 2, CORR_H), capMat, capGroup,
        0, CORR_H / 2, lastSeg.zEnd, 0, 0, 0);
      addSurface(tiledPlane(CORR_HALF * 2, CORR_H), capMat, capGroup,
        0, CORR_H / 2, 60, 0, Math.PI, 0);

      // ── Build doors (added to their room's group) ────────────────────────────
      plan.segments.forEach(function (seg) {
        seg.doors.forEach(function (door) {
          var rg    = roomById[door.roomId];
          var room  = rg.room;
          var xSign = door.side === 'left' ? -1 : 1;

          var doorCol = new THREE.Color().setHSL(room.hue, 0.4, room.special ? 0.32 : 0.20);
          var doorMat = new THREE.ShaderMaterial({
            uniforms: ss.makeUniforms({
              uColor: { value: doorCol }, uDeform: { value: 0 },
              uFFTUV: { value: 1.0 },    uLineWidth: { value: 2.8 }
            }),
            vertexShader: ss.vertexShader, fragmentShader: ss.fragmentShader,
            transparent: true, depthWrite: false, side: THREE.DoubleSide
          });
          wallMats.push(doorMat);

          var doorGeo = tiledPlane(DOOR_W, DOOR_H);

          // Pivot sits at the bottom-centre of the doorway in the wall.
          // Sliding its Y up animates the door rising into the ceiling.
          var pivot = new THREE.Group();
          pivot.position.set(xSign * (CORR_HALF - 0.4), 0, door.zPos);
          pivot.rotation.y = xSign * Math.PI / 2;
          rg.group.add(pivot);

          // Both meshes are children of the pivot, offset to door centre height
          var maskMesh = new THREE.Mesh(doorGeo, maskMat);
          maskMesh.position.y = DOOR_H / 2;
          pivot.add(maskMesh);

          var wireMesh = new THREE.Mesh(addBarycentricCoords(doorGeo), doorMat);
          wireMesh.position.y = DOOR_H / 2;
          pivot.add(wireMesh);

          rg.doorPivot    = pivot;
          rg.doorMesh     = wireMesh;
          rg.doorMaskMesh = maskMesh;
        });
      });

      // ── Raycaster ───────────────────────────────────────────────────────────
      var raycaster    = new THREE.Raycaster();
      var screenCenter = new THREE.Vector2(0, 0);
      var hintTick     = 0;

      function tryOpenDoor() {
        raycaster.setFromCamera(screenCenter, camera);
        var candidates = [];
        roomGroups.forEach(function (rg) {
          if (rg.group.visible && rg.doorMesh && !rg.room.open) {
            candidates.push(rg.doorMesh);
          }
        });
        var hits = raycaster.intersectObjects(candidates);
        if (hits.length > 0 && hits[0].distance < 220) {
          var hit = hits[0].object;
          var rg  = roomGroups.find(function (r) { return r.doorMesh === hit; });
          if (rg && !rg.opening) {
            rg.opening   = true;
            rg.room.open = true;
            openedRooms++;
            hudRooms.textContent = 'rooms  ' + openedRooms;
          }
        }
      }

      openDoorFn = tryOpenDoor;

      document.addEventListener('click', function () {
        overlay.style.display = 'none';
        startAudioIfNeeded();
        if (document.pointerLockElement) tryOpenDoor();
      });

      // ── Reusable vectors ─────────────────────────────────────────────────────
      var touchDir = new THREE.Vector3();
      var lookEuler = new THREE.Euler(0, 0, 0, 'YXZ');

      // ── Update ──────────────────────────────────────────────────────────────
      return {
        update: function (fftArray, elapsed, dt) {
          var rms  = window.jazzRMS || 0;
          var camX = camera.position.x;
          var camZ = camera.position.z;

          // ── Culling ─────────────────────────────────────────────────────────
          for (var c = 0; c < corrGroups.length; c++) {
            var cg   = corrGroups[c];
            var dz   = Math.abs(camZ - cg.zMid);
            if      (dz > CORR_HIDE) cg.group.visible = false;
            else if (dz < CORR_SHOW) cg.group.visible = true;
          }
          for (var r = 0; r < roomGroups.length; r++) {
            var rg  = roomGroups[r];
            var rdx = camX - rg.centerX;
            var rdz = camZ - rg.room.zCenter;
            var d2  = rdx * rdx + rdz * rdz;
            if      (d2 > ROOM_HIDE * ROOM_HIDE) rg.group.visible = false;
            else if (d2 < ROOM_SHOW * ROOM_SHOW) rg.group.visible = true;
          }

          // ── Door slide-up animation ──────────────────────────────────────────
          for (var a = 0; a < roomGroups.length; a++) {
            var ag = roomGroups[a];
            if (ag.opening) {
              ag.openY += 260 * dt;
              ag.doorPivot.position.y = ag.openY;
              if (ag.openY >= DOOR_H) {
                ag.doorPivot.visible = false;
                ag.opening = false;
              }
            }
          }

          // ── Room objects: live FFT deform + spin ─────────────────────────────
          for (var i = 0; i < allRoomObjs.length; i++) {
            var o = allRoomObjs[i];
            o.mat.uniforms.uDeform.value = rms * MAX_DEFORM;
            o.mat.uniforms.uTime.value   = elapsed;
            o.mesh.rotation.x += o.spinX * dt;
            o.mesh.rotation.y += o.spinY * dt;
            o.mesh.rotation.z += o.spinZ * dt;
          }

          // ── Corridor wall audio wobble ────────────────────────────────────────
          for (var j = 0; j < wallMats.length; j++) {
            wallMats[j].uniforms.uDeform.value = rms * 65;
            wallMats[j].uniforms.uTime.value   = elapsed;
          }

          // ── Collision — keep player inside corridor / open rooms ─────────────
          // Compute allowed X range at this Z based on open rooms
          var pz   = camera.position.z;
          var xLo  = -(CORR_HALF - PLAYER_R);
          var xHi  =  (CORR_HALF - PLAYER_R);
          for (var ri = 0; ri < roomGroups.length; ri++) {
            var prg  = roomGroups[ri];
            if (!prg.room.open) continue;
            var prm  = prg.room;
            var pxSign = prm.side === 'left' ? -1 : 1;
            var pCX    = pxSign * (CORR_HALF + prm.w / 2);
            if (Math.abs(pz - prm.zCenter) < prm.d / 2 - PLAYER_R) {
              if (prm.side === 'left') xLo = Math.min(xLo, pCX - prm.w / 2 + PLAYER_R);
              else                     xHi = Math.max(xHi, pCX + prm.w / 2 - PLAYER_R);
            }
          }
          camera.position.x = Math.max(xLo, Math.min(xHi, camera.position.x));
          camera.position.y = EYE_Y;
          // Z: stay within corridor length
          camera.position.z = Math.max(lastSegZEnd + PLAYER_R, Math.min(40, camera.position.z));

          // ── Touch look ───────────────────────────────────────────────────────
          if (!document.pointerLockElement && touchEverUsed) {
            myYaw   -= lookAccYaw   * LOOK_SENS;
            myPitch -= lookAccPitch * LOOK_SENS;
            myPitch  = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, myPitch));
            lookEuler.set(myPitch, myYaw, 0);
            camera.quaternion.setFromEuler(lookEuler);
          }
          lookAccYaw = lookAccPitch = 0;

          // ── Touch joystick movement ───────────────────────────────────────────
          if (joyActive && (joyDX !== 0 || joyDY !== 0)) {
            touchDir.set(joyDX, 0, joyDY).normalize().applyQuaternion(camera.quaternion);
            touchDir.y = 0;
            camera.position.addScaledVector(touchDir, MOVE_SPEED * dt);
          }

          // ── HUD: corridor number ──────────────────────────────────────────────
          for (var k = 0; k < plan.segments.length; k++) {
            var s = plan.segments[k];
            if (camZ <= s.zStart && camZ >= s.zEnd) {
              hudSeg.textContent = 'corridor  ' + (k + 1) + (s.special ? '  ★' : '');
              break;
            }
          }

          // ── Door hint (every 8 frames) ────────────────────────────────────────
          hintTick++;
          if (hintTick % 8 === 0 && (document.pointerLockElement || touchEverUsed)) {
            raycaster.setFromCamera(screenCenter, camera);
            var cands = [];
            roomGroups.forEach(function (rg) {
              if (rg.group.visible && rg.doorMesh && !rg.room.open)
                cands.push(rg.doorMesh);
            });
            var h = raycaster.intersectObjects(cands);
            doorHint.style.display = (h.length > 0 && h[0].distance < 220) ? 'block' : 'none';
          } else if (!document.pointerLockElement && !touchEverUsed) {
            doorHint.style.display = 'none';
          }
        },

        reset: function () {
          openedRooms = 0;
          roomGroups.forEach(function (rg) {
            if (rg.doorPivot) {
              rg.doorPivot.position.y = 0;
              rg.doorPivot.visible    = true;
            }
            rg.opening   = false;
            rg.openY     = 0;
            rg.room.open = false;
          });
          hudRooms.textContent = 'rooms  0';
          doorHint.style.display = 'none';
          myPitch = 0; myYaw = 0; touchEverUsed = false;
        }
      };
    }
  });
  </script>
</body>
</html>
