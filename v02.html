<!DOCTYPE html>
<html>
<head>
  <script src="./maximilian.v.0.1.js"></script>
  <script src="./enable-threads.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script src="./engine.js"></script>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Jazz — Tunnel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #ui { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; }
    a.back { color: white; text-decoration: none; font-size: 13px; font-family: monospace; border: 1px solid rgba(255,255,255,0.5); padding: 6px 12px; }
    a.back:hover { background: rgba(255,255,255,0.1); }
    button { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 13px; font-family: monospace; padding: 6px 12px; cursor: pointer; }
    button:hover { background: rgba(255,255,255,0.1); }
    #hint { position: absolute; bottom: 16px; left: 16px; color: rgba(255,255,255,0.3); font-size: 11px; font-family: monospace; pointer-events: none; }
  </style>
</head>
<body>
  <div id="ui">
    <a class="back" href="index.html">← gallery</a>
    <button id="playButton">play</button>
    <button id="resetButton">reset</button>
  </div>
  <div id="hint">click canvas · wasd = move · mouse = look · q/e = up/down</div>
  <script>
    initJazzEngine({
      title: 'Tunnel',
      trailOpacity: 0.10,
      camera: {
        position: new THREE.Vector3(0, 0, 1900),
        lookAt: new THREE.Vector3(0, 0, -1900)
      },
      bounds: 2000,
      speed: 200,
      audio: {
        sparsity_1: 0.1,
        sparsity_2: 0.15,
        tempo: 140,
        maxTicksPerBeat: 16,
        fastFreqBase: 400,
        fastFreqRange: 800,
        fastModIRange: 20000,
        decayFeedbackValue: 0.995
      },
      sceneSetup: function (scene, camera, ss) {
        // Main tunnel cylinder — open ended, camera inside
        var cylGeo = addBarycentricCoords(
          new THREE.CylinderGeometry(300, 300, 4000, 32, 32, true)
        );
        var cylMat = new THREE.ShaderMaterial({
          vertexShader: ss.vertexShader,
          fragmentShader: ss.fragmentShader,
          uniforms: ss.makeUniforms({
            uDeform:    { value: 800.0 },
            uLineWidth: { value: 1.5 },
            uFFTUV:     { value: 1.0 }   // vary FFT along height (circumference depth)
          }),
          transparent: true,
          depthWrite: false,
          side: THREE.BackSide  // render inside surface
        });
        var cylinder = new THREE.Mesh(cylGeo, cylMat);
        // CylinderGeometry is Y-axis aligned; rotate so it runs along Z
        cylinder.rotation.x = Math.PI / 2;
        scene.add(cylinder);

        // Depth-cue rings at z = -1200, 0, +1200
        var ringPositions = [-1200, 0, 1200];
        var rings = ringPositions.map(function (z) {
          var rGeo = addBarycentricCoords(new THREE.TorusGeometry(280, 4, 8, 32));
          var rMat = new THREE.ShaderMaterial({
            vertexShader: ss.vertexShader,
            fragmentShader: ss.fragmentShader,
            uniforms: ss.makeUniforms({
              uDeform:    { value: 200.0 },
              uLineWidth: { value: 2.0 },
              uFFTUV:     { value: 0.0 }
            }),
            transparent: true,
            depthWrite: false
          });
          var ring = new THREE.Mesh(rGeo, rMat);
          ring.position.z = z;
          scene.add(ring);
          return { mesh: ring, mat: rMat };
        });

        return {
          update: function (fftArray, elapsed, dt) {
            cylMat.uniforms.uTime.value = elapsed;
            rings.forEach(function (r) { r.mat.uniforms.uTime.value = elapsed; });

            // Slow spin of rings for a hypnotic depth effect
            rings.forEach(function (r, i) {
              r.mesh.rotation.z += (0.2 + i * 0.05) * dt;
            });
          },
          reset: function () {
            rings.forEach(function (r) { r.mesh.rotation.set(0, 0, 0); });
          },
          gui: function (folder, audioParams, sendFn) {
            folder.add(cylMat.uniforms.uDeform, 'value', 0, 2000, 10).name('Tunnel deform');
            folder.add(cylMat.uniforms.uLineWidth, 'value', 0.5, 6, 0.1).name('Line width');
          }
        };
      }
    });
  </script>
</body>
</html>
